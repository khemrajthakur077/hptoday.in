name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Har 3 din mein ek baar chalega
  workflow_dispatch: # Manual testing ke liye button enable karega

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Edge Function
        run: |
          curl -i -X POST https://vpyjwoprsncmgxkdiqij.supabase.co/functions/v1/swift-action \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json"